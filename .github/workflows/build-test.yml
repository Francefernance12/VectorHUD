name: Build and Test Tauri App

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-tauri:
    runs-on: windows-latest
    env:
      CARGO_HTTP_MULTIPLEXING: false
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'VectorHUD/package-lock.json'
          
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: VectorHUD/src-tauri

      - name: Install Frontend Dependencies
        working-directory: ./VectorHUD
        run: npm install

      - name: Setup FFmpeg Sidecar
        shell: powershell
        run: ./VectorHUD/src-tauri/download-ffmpeg.ps1

      - name: Build Tauri App
        working-directory: ./VectorHUD
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: npm run tauri build
